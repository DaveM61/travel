<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel — dave&amp;mike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --bg:        #F0EDE7;
      --slate:     #5E82A0;
      --text:      #1C1A16;
      --muted:     #7A746C;
      --faded:     #C0BAB2;
      --footer-bg: #8AAEC8;
      --logo-w:    100px;
      --h-pad:     32px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── 12px slate bar ── */
    .top-bar {
      height: 12px;
      background: var(--slate);
      flex-shrink: 0;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 12px var(--h-pad);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .logo-wrap {
      width: var(--logo-w);
      display: block;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Header image zone
       Flush to left edge of page. Logo sits above it via z-index.
       Gradient: left = transparent (cream shows through, keeps logo readable),
                 right = fully visible image.
       object-position: left top — anchors top of image so top of photo is visible.
    ── */
    .header-img-zone {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right,
        transparent 0%,
        transparent 15%,
        black 38%,
        black 100%
      );
      mask-image: linear-gradient(to right,
        transparent 0%,
        transparent 15%,
        black 38%,
        black 100%
      );
    }

    /* ── Header title block ── */
    .header-title-block {
      position: relative;
      z-index: 2;
      margin-left: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-title-block h1 {
      font-size: 2rem;
      margin-bottom: 0.15rem;
    }

    .header-title-block .descriptor {
      font-size: 13px;
      margin-bottom: 0;
    }

    .header-img-zone img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 45%;  /* lower half — hills, road, olive trees */
      display: block;
    }

    /* ── Back link — slim cream bar below header ── */
    .back-bar {
      background: var(--bg);
      display: flex;
      justify-content: flex-end;
      padding: 8px var(--h-pad);
      flex-shrink: 0;
    }

    .back-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--slate);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .back-link:hover { text-decoration: underline; }

    /* ── Main content
       Left edge aligns with logo right edge = h-pad + logo-w = 132px.
       Top-aligned — no vertical centering.
    ── */
    main {
      flex: 1;
      padding: 36px var(--h-pad) 48px calc(var(--h-pad) + var(--logo-w));
    }

    .content {
      max-width: 480px;
    }

    /* ── Page title ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 2.8rem;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    /* ── Descriptor ── */
    .descriptor {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Thin rule ── */
    .rule {
      border: none;
      border-top: 0.5px solid rgba(28, 26, 22, 0.15);
      margin-bottom: 1.5rem;
    }

    /* ── Two-column trips grid ── */
    .trips-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 48px;
      max-width: 640px;
    }

    .col-header {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--slate);
      padding-bottom: 10px;
      border-bottom: 0.5px solid rgba(28,26,22,0.15);
      margin-bottom: 14px;
    }

    /* ── Link list ── */
    .link-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-list a {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .link-list a .arrow { color: var(--slate); }
    .link-list a:hover  { color: var(--slate); }

    .link-list .coming-soon {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--faded);
    }

    .link-list .inactive-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--faded);
      cursor: default;
    }

    /* ── Footer ── */
    footer {
      background: var(--footer-bg);
      padding: 14px var(--h-pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* Breadcrumb trail — dave&mike and esperienze are linked, travel is current */
    .footer-breadcrumb {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
    }

    .footer-breadcrumb a {
      color: var(--text);
      text-decoration: none;
    }

    .footer-breadcrumb a:hover {
      text-decoration: underline;
    }

    .footer-breadcrumb .crumb-esperienze {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 16px;   /* larger than surrounding 12px DM Sans */
    }

    .footer-breadcrumb .crumb-current {
      /* unlinked — you are here */
      color: var(--text);
    }

    .footer-contact {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
    }

    .footer-contact:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .header-img-zone {
        -webkit-mask-image: linear-gradient(to right,
          transparent 0%, transparent 55%, black 75%, black 100%);
        mask-image: linear-gradient(to right,
          transparent 0%, transparent 55%, black 75%, black 100%);
      }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <header>

    <a class="logo-wrap" href="https://daveandmike.net">
      <img src="assets/dnm_logo.svg" alt="dave&amp;mike">
    </a>
    <div class="header-title-block">
      <h1>Travel</h1>
      <p class="descriptor">Where we've been, where we're going</p>
    </div>

    <!-- Header image — drop assets/travel_header.png in place when ready -->
    <div class="header-img-zone">
      <img src="assets/travel_header.png" alt="">
    </div>

  </header>

  <div class="back-bar">
    <a class="back-link" href="https://daveandmike.net">← Travel</a>
  </div>

  <main>
    <div class="content">
      <div class="trips-grid">
        <div class="trips-col">
          <div class="col-header">Active Trips &amp; Planning</div>
          <ul class="link-list">
            <li><a href="italy-2026/index.html">Italy 2026 | May 11 &ndash; Jun 22 <span class="arrow">→</span></a></li>
            <li><span class="inactive-link">Ski / Ride 2027 &mdash; Park City | Feb 12 &ndash; 26 →</span></li>
          </ul>
        </div>
        <div class="trips-col">
          <div class="col-header">Trip Archive</div>
          <ul class="link-list">
            <li><span class="coming-soon">Coming Soon</span></li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span class="footer-breadcrumb">
      <a href="https://daveandmike.net">dave&amp;mike</a>
      &nbsp;·&nbsp;
      <a href="https://daveandmike.net" class="crumb-esperienze">esperienze</a>
      &nbsp;·&nbsp;
      <span class="crumb-current">travel</span>
    </span>
    <a class="footer-contact" href="mailto:services@musel.us">Contact Dave &amp; Mike</a>
  </footer>

</body>
</html>
