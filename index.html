<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel — dave&amp;mike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    :root {
      --bg:        #F0EDE7;
      --slate:     #5E82A0;
      --text:      #1C1A16;
      --muted:     #7A746C;
      --faded:     #C0BAB2;
      --footer-bg: #8AAEC8;
      --logo-w:    100px;       /* logo width — used to align content */
      --h-pad:     32px;        /* header / page horizontal padding */
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── 12px slate bar — clearly site chrome, not browser ── */
    .top-bar {
      height: 12px;
      background: var(--slate);
      flex-shrink: 0;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px var(--h-pad);
      flex-shrink: 0;
    }

    .logo-wrap {
      width: var(--logo-w);
      display: block;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .back-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--slate);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .back-link:hover { text-decoration: underline; }

    /* ── Main content
       Left edge of content aligns with right edge of logo:
       h-pad (32px) + logo-width (100px) = 132px from viewport left.
       Content sits near the top — no vertical centering.
    ── */
    main {
      flex: 1;
      padding: 36px var(--h-pad) 48px calc(var(--h-pad) + var(--logo-w));
    }

    .content {
      max-width: 480px;
    }

    /* ── Page title ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 2.8rem;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    /* ── Descriptor ── */
    .descriptor {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Thin rule ── */
    .rule {
      border: none;
      border-top: 0.5px solid rgba(28, 26, 22, 0.15);
      margin-bottom: 1.5rem;
    }

    /* ── Link list ── */
    .link-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-list a {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .link-list a .arrow { color: var(--slate); }
    .link-list a:hover  { color: var(--slate); }

    .link-list .coming-soon {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faded);
    }

    /* ── Footer ── */
    footer {
      background: var(--footer-bg);
      padding: 14px var(--h-pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .footer-left {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
    }

    .footer-left em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
    }

    .footer-contact {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
    }

    .footer-contact:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <header>
    <a class="logo-wrap" href="https://daveandmike.net">
      <img src="assets/dnm_logo.svg" alt="dave&amp;mike">
    </a>
    <a class="back-link" href="https://daveandmike.net">← Travel</a>
  </header>

  <main>
    <div class="content">
      <h1>Travel</h1>
      <p class="descriptor">Where we've been, where we're going</p>
      <hr class="rule">
      <ul class="link-list">
        <li><a href="https://italy.daveandmike.net">Italy 2026 <span class="arrow">→</span></a></li>
        <li><span class="coming-soon">Past trips</span></li>
      </ul>
    </div>
  </main>

  <footer>
    <span class="footer-left">dave&amp;mike · <em>esperienze</em> · travel</span>
    <a class="footer-contact" href="mailto:services@musel.us">Contact Dave &amp; Mike</a>
  </footer>

</body>
</html>
