<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italy 2026 — Trip Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  :root {
    --warm-rule: rgba(28,26,22,0.12);
    --ink:       var(--text);
    --muted-cal: var(--muted);
    --terracotta: var(--muted);
    --sage:       var(--slate);
    --gold:       var(--muted);
  }

  body { font-family: 'DM Sans', sans-serif; }

  /* ─── CALENDAR OUTER ─── */
  .cal-outer {
    max-width: 1160px;
    margin: 0 auto;
    padding: 40px 24px 72px;
  }

  /* Legend */
  .cal-legend {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--warm-rule);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
  }

  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid;
  }
  .legend-swatch.ostuni { background: #fdf0e8; border-color: #e8c8a8; }
  .legend-swatch.arezzo { background: #eef3ec; border-color: #b8d0b8; }
  .legend-swatch.out    { background: #f5f2ed; border-color: rgba(28,26,22,0.12); }

  /* Month block */
  .cal-month-block { margin-bottom: 56px; }

  .cal-month-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .cal-month-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* Day-of-week headers */
  .cal-dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }

  .cal-dow {
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 5px 0 7px;
    border-bottom: 1px solid var(--warm-rule);
  }

  /* Grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  /* ─── DAY CELLS ─── */
  .day {
    border-radius: 4px;
    padding: 8px 10px 10px;
    overflow: hidden;
    border: 1px solid transparent;
  }

  .day-empty {
    background: transparent;
    border-color: transparent;
    min-height: 38px;
  }

  .day-out {
    background: #f5f2ed;
    border-color: rgba(28,26,22,0.10);
    min-height: 38px;
  }

  /* PRESERVED functional calendar colors */
  .day-ostuni {
    background: #fdf0e8;
    border-color: #e8c8a8;
    min-height: 124px;
  }

  .day-arezzo {
    background: #eef3ec;
    border-color: #b8d0b8;
    min-height: 124px;
  }

  .day-num {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2px;
  }

  .day-out .day-num {
    font-size: 13px;
    color: var(--muted);
  }

  .day-loc {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .day-ostuni .day-loc { color: #b07040; }
  .day-arezzo  .day-loc { color: #5E82A0; }

  .bed-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .bed-item {
    display: flex;
    align-items: baseline;
    gap: 5px;
    line-height: 1.25;
  }

  .bed-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
    width: 24px;
  }

  .bed-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .bed-item.vacant .bed-name { color: #ccc5b8; }

  .excur-item {
    display: flex;
    align-items: baseline;
    gap: 5px;
    line-height: 1.25;
    margin-top: 2px;
    padding-top: 3px;
    border-top: 1px dotted var(--warm-rule);
  }
  .excur-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
    width: 24px;
  }
  .excur-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--slate);
    line-height: 1.2;
  }
  .excur-name a {
    color: inherit;
    text-decoration: none;
  }
  .excur-name a:hover {
    text-decoration: underline;
  }
  .excur-item.empty .excur-name { color: #ccc5b8; font-weight: 400; }

  /* Override main padding — cal-outer handles its own spacing */
  main { padding: 0; }

  @media (max-width: 600px) {
    .cal-outer { padding: 28px 12px 48px; }
    .cal-grid, .cal-dow-row { gap: 2px; }
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<header>
  <a class="logo-wrap" href="https://daveandmike.net">
    <img src="assets/dnm_logo.svg" alt="dave&amp;mike">
  </a>
  <div class="header-img-zone">
    <img src="assets/italy-header.jpg" alt="">
  </div>
</header>

<div class="back-bar">
  <a class="back-link" href="index.html">← Home</a>
</div>

<main>
<div class="cal-outer">

  <!-- Legend -->
  <div class="cal-legend">
    <div class="legend-item">
      <div class="legend-swatch ostuni"></div>
      <span>Ostuni &nbsp;<em style="opacity:0.6;">May 11 – 31</em></span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch arezzo"></div>
      <span>Arezzo &nbsp;<em style="opacity:0.6;">June 1 – 22</em></span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch out"></div>
      <span style="opacity:0.6;">Outside stay</span>
    </div>
  </div>

  <!-- MAY 2026 -->
  <div class="cal-month-block">
    <div class="cal-month-eyebrow">Month One</div>
    <div class="cal-month-title">May 2026</div>
    <div class="cal-dow-row">
      <div class="cal-dow">Sun</div>
      <div class="cal-dow">Mon</div>
      <div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div>
      <div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
    <div class="cal-grid" id="may-grid"></div>
  </div>

  <!-- JUNE 2026 -->
  <div class="cal-month-block">
    <div class="cal-month-eyebrow">Month Two</div>
    <div class="cal-month-title">June 2026</div>
    <div class="cal-dow-row">
      <div class="cal-dow">Sun</div>
      <div class="cal-dow">Mon</div>
      <div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div>
      <div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
    <div class="cal-grid" id="june-grid"></div>
  </div>

  <!-- JULY 2026 (partial — return window) -->
  <div class="cal-month-block">
    <div class="cal-month-eyebrow">Return Window</div>
    <div class="cal-month-title">July 2026</div>
    <div class="cal-dow-row">
      <div class="cal-dow">Sun</div>
      <div class="cal-dow">Mon</div>
      <div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div>
      <div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
    <!-- July 1 = Wednesday (index 3); show July 1–4 only -->
    <div class="cal-grid">
      <div class="day day-empty"></div>
      <div class="day day-empty"></div>
      <div class="day day-empty"></div>
      <div class="day day-out"><div class="day-num">1</div></div>
      <div class="day day-out"><div class="day-num">2</div></div>
      <div class="day day-out"><div class="day-num">3</div></div>
      <div class="day day-out"><div class="day-num">4</div></div>
    </div>
  </div>

</div>

</main>

<footer>
  <span class="footer-breadcrumb">
    <a href="https://daveandmike.net/index.html">dave&amp;mike</a>
    &nbsp;&middot;&nbsp;
    <a href="https://daveandmike.net/index.html" class="crumb-esperienze">esperienze</a>
    &nbsp;&middot;&nbsp;
    <a href="https://travel.daveandmike.net">travel</a>
    &nbsp;&middot;&nbsp;
    <a href="index.html">italy 2026</a>
    &nbsp;&middot;&nbsp;
    <span class="crumb-current">calendar</span>
  </span>
  <a class="footer-contact" href="mailto:services@musel.us">Contact Dave &amp; Mike</a>
</footer>

<script>
  const bedDefs = [
    { label: 'Bd1', name: 'Dave & Mike',   start: new Date(2026, 4, 11), end: new Date(2026, 5, 21) },
    { label: 'Bd2', name: 'Mary',          start: new Date(2026, 4, 22), end: new Date(2026, 5,  3) },
    { label: 'Bd3', name: 'Jane & Chuck',  start: new Date(2026, 4, 21), end: new Date(2026, 5, 10) },
    { label: 'Bd4', name: 'Dave & Teresa', start: new Date(2026, 4, 29), end: new Date(2026, 5,  6) },
  ];

  // Excursion definitions: each entry maps a date to a name and optional link
  const excurDefs = [
    { date: new Date(2026, 4, 21), name: 'Matera',          href: 'matera.html' },
    { date: new Date(2026, 4, 22), name: 'Matera',          href: 'matera.html' },
    { date: new Date(2026, 4, 30), name: 'Itria Valley',    href: 'itria-valley.html' },
    { date: new Date(2026, 5,  3), name: 'Montepulciano',   href: 'montepulciano.html' },
    { date: new Date(2026, 5,  6), name: 'Verrazzano',      href: 'verrazano.html' },
    { date: new Date(2026, 5,  7), name: 'Verrazzano',      href: 'verrazano.html' },
    { date: new Date(2026, 5, 13), name: 'Forte di Marmi' },
    { date: new Date(2026, 5, 14), name: 'Forte di Marmi' },
  ];

  function getExcursion(date) {
    var dn = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
    for (var i = 0; i < excurDefs.length; i++) {
      var ed = excurDefs[i].date;
      if (new Date(ed.getFullYear(), ed.getMonth(), ed.getDate()).getTime() === dn) {
        return excurDefs[i];
      }
    }
    return null;
  }

  const ostuniStart = new Date(2026, 4, 11);
  const ostuniEnd   = new Date(2026, 4, 31);
  const arezzStart  = new Date(2026, 5,  1);
  const arezzEnd    = new Date(2026, 5, 22);

  function inRange(d, s, e) {
    const dn = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    const sn = new Date(s.getFullYear(), s.getMonth(), s.getDate()).getTime();
    const en = new Date(e.getFullYear(), e.getMonth(), e.getDate()).getTime();
    return dn >= sn && dn <= en;
  }

  function buildMonth(year, month, gridId) {
    const container = document.getElementById(gridId);
    const firstDay  = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    // Leading empty cells
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'day day-empty';
      container.appendChild(el);
    }

    for (let d = 1; d <= totalDays; d++) {
      const date  = new Date(year, month, d);
      const isOst = inRange(date, ostuniStart, ostuniEnd);
      const isAre = inRange(date, arezzStart,  arezzEnd);
      const isStay = isOst || isAre;

      const cell = document.createElement('div');
      cell.className = 'day ' + (isOst ? 'day-ostuni' : isAre ? 'day-arezzo' : 'day-out');

      // Date number
      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (isStay) {
        // Location label
        const locEl = document.createElement('div');
        locEl.className = 'day-loc';
        locEl.textContent = isOst ? 'Ostuni' : 'Arezzo';
        cell.appendChild(locEl);

        // Bed occupancy
        const bedList = document.createElement('div');
        bedList.className = 'bed-list';
        bedDefs.forEach(function(bed) {
          const occ  = inRange(date, bed.start, bed.end);
          const item = document.createElement('div');
          item.className = 'bed-item ' + (occ ? 'occupied' : 'vacant');
          item.innerHTML =
            '<span class="bed-label">' + bed.label + '</span>' +
            '<span class="bed-name">'  + (occ ? bed.name : '\u2014') + '</span>';
          bedList.appendChild(item);
        });
        cell.appendChild(bedList);

        // Excursion row
        var excur = getExcursion(date);
        var excurEl = document.createElement('div');
        excurEl.className = 'excur-item' + (excur ? '' : ' empty');
        var nameHtml = excur
          ? (excur.href ? '<a href="' + excur.href + '">' + excur.name + '</a>' : excur.name)
          : '\u2014';
        excurEl.innerHTML =
          '<span class="excur-label">Exc</span>' +
          '<span class="excur-name">' + nameHtml + '</span>';
        cell.appendChild(excurEl);
      }

      container.appendChild(cell);
    }

    // Trailing empty cells to complete the last row
    const total = firstDay + totalDays;
    const rem   = total % 7;
    if (rem > 0) {
      for (let i = 0; i < 7 - rem; i++) {
        const el = document.createElement('div');
        el.className = 'day day-empty';
        container.appendChild(el);
      }
    }
  }

  buildMonth(2026, 4, 'may-grid');
  buildMonth(2026, 5, 'june-grid');
</script>

</body>
</html>
