<link rel="stylesheet" href="style.css">
<style>
  .header-title-block {
    position: relative;
    z-index: 2;
    margin-left: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .header-title-block .trip-eyebrow { margin-bottom: 0.25rem; }
  .header-title-block .trip-name { font-size: 2rem; margin-bottom: 0.2rem; }
  .header-title-block .trip-dates { font-size: 13px; margin-bottom: 0; }

  .header-img-zone {
    -webkit-mask-image: linear-gradient(to right, transparent 0%, transparent 15%, black 38%, black 100%);
    mask-image: linear-gradient(to right, transparent 0%, transparent 15%, black 38%, black 100%);
  }

  @media (max-width: 600px) {
    .header-img-zone {
      -webkit-mask-image: linear-gradient(to right, transparent 0%, transparent 55%, black 75%, black 100%);
      mask-image: linear-gradient(to right, transparent 0%, transparent 55%, black 75%, black 100%);
    }
  }

  /* ── Photo grid ── */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .photo-item {
    display: block;
    padding: 0;
    margin: 0;
    border: none;
    background: none;
    cursor: pointer;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 4px;
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .photo-item:hover img {
    transform: scale(1.05);
  }

  .photo-count {
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28, 26, 22, 0.94);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.open { display: flex; }

  .lightbox-img-wrap {
    max-width: 92vw;
    max-height: 82vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-img-wrap img {
    max-width: 92vw;
    max-height: 82vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }

  .lightbox-caption {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: rgba(240,237,231,0.85);
    margin-top: 16px;
  }

  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--bg);
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--bg);
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px;
    opacity: 0.75;
    transition: opacity 0.2s;
  }

  .lightbox-nav:hover { opacity: 1; }
  .lightbox-prev { left: 8px; }
  .lightbox-next { right: 8px; }

  @media (max-width: 600px) {
    .photo-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 4px; }
    .lightbox-nav { font-size: 24px; padding: 12px; }
    .lightbox-close { top: 14px; right: 18px; font-size: 24px; }
  }
</style>

<script>
  (function() {
    var items = Array.prototype.slice.call(document.querySelectorAll('.photo-item'));
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var lightboxCaption = document.getElementById('lightboxCaption');
    var currentIndex = 0;

    function show(index) {
      currentIndex = (index + items.length) % items.length;
      var item = items[currentIndex];
      lightboxImg.src = item.getAttribute('data-full');
      lightboxImg.alt = item.getAttribute('data-caption') || '';
      lightboxCaption.textContent = item.getAttribute('data-caption') || '';
    }

    function open(index) {
      show(index);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    items.forEach(function(item, i) {
      item.addEventListener('click', function() { open(i); });
    });

    document.getElementById('lightboxClose').addEventListener('click', close);
    document.getElementById('lightboxPrev').addEventListener('click', function() { show(currentIndex - 1); });
    document.getElementById('lightboxNext').addEventListener('click', function() { show(currentIndex + 1); });

    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) close();
    });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      if (e.key === 'ArrowLeft') show(currentIndex - 1);
      if (e.key === 'ArrowRight') show(currentIndex + 1);
    });
  })();
</script>
